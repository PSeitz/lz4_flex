
[package]
name = "lz4_flex-fuzz"
version = "0.0.0"
authors = ["Automatically generated"]
publish = false
edition = "2018"

[package.metadata]
cargo-fuzz = true

[features]
default = ["safe-encode", "safe-decode", "hc"]
safe-encode = ["lz4_flex/safe-encode"]
safe-decode = ["lz4_flex/safe-decode"]
hc = ["lz4_flex/hc"]

[dependencies]
arbitrary = { version = "1", features = ["derive"] }
libfuzzer-sys = "0.4"
lzzzz = "0.8"

lz4_flex = { path = "..", default-features = false, features=["frame", "hc"] }

# Prevent this from interfering with workspaces
[workspace]
members = ["."]

[[bin]]
name = "fuzz_roundtrip"
path = "fuzz_targets/fuzz_roundtrip.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_frame"
path = "fuzz_targets/fuzz_roundtrip_frame.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_cpp_compress"
path = "fuzz_targets/fuzz_roundtrip_cpp_compress.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_cpp_decompress"
path = "fuzz_targets/fuzz_roundtrip_cpp_decompress.rs"
test = false
doc = false

[[bin]]
name = "fuzz_decomp_corrupt_block"
path = "fuzz_targets/fuzz_decomp_corrupt_block.rs"
test = false
doc = false

[[bin]]
name = "fuzz_decomp_corrupt_frame"
path = "fuzz_targets/fuzz_decomp_corrupt_frame.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_hc"
path = "fuzz_targets/fuzz_roundtrip_hc.rs"
test = false
doc = false

[[bin]]
name = "fuzz_roundtrip_hc_cpp"
path = "fuzz_targets/fuzz_roundtrip_hc_cpp.rs"
test = false
doc = false
